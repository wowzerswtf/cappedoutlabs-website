<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:512px;height:512px;overflow:hidden}
  .wrap{width:512px;height:512px;position:relative;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(125% 125% at 30% 12%, #244a6e 0%, #1a3a5c 48%, #122740 100%)}
  .dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(96,165,250,.10) 1.5px,transparent 1.5px);background-size:32px 32px}
  .glow{position:absolute;width:430px;height:430px;border-radius:50%;
    background:radial-gradient(circle,rgba(37,99,235,.32),transparent 64%)}
  svg{position:relative;width:300px;height:300px;filter:drop-shadow(0 14px 34px rgba(37,99,235,.40))}
</style></head>
<body><div class="wrap">
  <div class="dots"></div><div class="glow"></div>
  <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="28" y1="50" x2="92" y2="50" stroke="#93c5fd" stroke-opacity="0.55" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="33" y="62" width="13" height="26" rx="3.5" fill="#3b82f6"/>
    <rect x="53.5" y="54" width="13" height="34" rx="3.5" fill="#60a5fa"/>
    <rect x="74" y="34" width="13" height="54" rx="3.5" fill="#2563EB"/>
    <path d="M80.5 21 L91.5 37 L69.5 37 Z" fill="#bfdbfe"/>
  </svg>
</div></body></html>
